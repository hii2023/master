<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0a2342 0%, #0e4d6e 40%, #0d7d9e 75%, #1ab3cc 100%);
            background-attachment: fixed;
            color: #fff;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 3.5rem 1.5rem 1.5rem;
        }
        .hero h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .hero h1 span {
            background: linear-gradient(90deg, #7df9ff, #a8edff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: rgba(255,255,255,0.6);
            margin-top: 0.4rem;
            font-size: 0.9rem;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
            margin-top: 1.4rem;
        }
        .stat-pill {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 40px;
            padding: 0.38rem 1rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.9);
        }
        .stat-pill strong { color: #fff; }

        /* CONTROLS */
        .controls {
            max-width: 680px;
            margin: 1.75rem auto 0;
            padding: 0 1.5rem;
        }
        .search-wrap { position: relative; }
        .search-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 0.9rem;
        }
        .search-wrap input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
        .search-wrap input:focus {
            border-color: rgba(125,249,255,0.6);
            background: rgba(255,255,255,0.15);
        }
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.9rem;
            justify-content: center;
        }
        .filter-btn {
            padding: 0.38rem 1rem;
            border-radius: 30px;
            border: 1.5px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s;
        }
        .filter-btn:hover  { background: rgba(255,255,255,0.16); color: #fff; }
        .filter-btn.active { background: rgba(125,249,255,0.22); border-color: #7df9ff; color: #7df9ff; }

        /* GRID */
        .container { max-width: 1160px; margin: 2rem auto 4rem; padding: 0 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1.4rem; }

        /* GROUP DIVIDER */
        .group-divider {
            grid-column: 1 / -1;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            padding-bottom: 0.35rem;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin-top: 0.5rem;
        }

        /* CARD */
        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 18px 48px rgba(0,0,0,0.28);
        }
        .card:active { transform: translateY(-2px); }

        /* Card banner */
        .banner {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            line-height: 1;
            position: relative;
            flex-shrink: 0;
        }
        .banner-badge {
            position: absolute;
            top: 9px; right: 10px;
            font-size: 0.58rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .badge-live   { background: rgba(255,255,255,0.3); color: #fff; }
        .badge-github { background: rgba(0,0,0,0.22); color: rgba(255,255,255,0.85); }

        /* Card body */
        .card-body {
            padding: 1rem 1.1rem 1.1rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-title {
            font-size: 0.97rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.2rem;
            word-break: break-word;
        }
        .card-url {
            font-size: 0.67rem;
            color: #60a5fa;
            margin-bottom: 0.55rem;
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .card-desc {
            font-size: 0.83rem;
            color: #6b7280;
            line-height: 1.55;
            flex-grow: 1;
            margin-bottom: 0.85rem;
        }
        .card-desc.empty { font-style: italic; color: #d1d5db; }

        /* Sub-pages */
        .sub-section { margin-bottom: 0.85rem; }
        .sub-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 0.4rem;
        }
        .sub-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .chip-page   { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
        .chip-anchor { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
        .chip-tab    { background: #f3f4f6; color: #9ca3af; border-color: #e5e7eb; cursor: default; }
        .chip-page:hover   { background: #dbeafe; border-color: #93c5fd; }
        .chip-anchor:hover { background: #dcfce7; border-color: #86efac; }

        /* Card footer */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding-top: 0.65rem;
            border-top: 1px solid #f3f4f6;
            margin-top: auto;
        }
        .card-updated { font-size: 0.67rem; color: #d1d5db; }
        .open-btn {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.35rem 0.85rem;
            border-radius: 8px;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        .open-btn:hover { opacity: 0.82; }
        .btn-live   { background: #0077b6; color: #fff; }
        .btn-github { background: #1f2937; color: #fff; }

        /* Loading / error */
        .state-msg {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem 1rem;
            color: rgba(255,255,255,0.5);
        }
        .spinner {
            display: inline-block;
            width: 34px; height: 34px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #7df9ff;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-bottom: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .no-results {
            grid-column: 1/-1;
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.28);
        }
        footer a { color: rgba(255,255,255,0.35); text-decoration: none; }
        footer a:hover { color: rgba(255,255,255,0.65); }

        @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>

            { label: 'Ahmedabad',     href: 'https://hii2023.github.io/nosh7in/ahmedabad.html',    kind: 'page' },
        ]

};

/* ── SMART FALLBACK DESCRIPTIONS ── */
const DESC = {
    'nosh7-whatsapp-crm': 'WhatsApp CRM system for Nosh7 subscription management',
    'nosh7-crm':          'Customer relationship management dashboard for Nosh7',
    'nosh7-outreach':     'Outreach and marketing automation tool for Nosh7',
    'landing-page-nosh7': 'Partner landing page for Nosh7 nutritionists & dietitians',
    'nosh7-in':           'Main Nosh7 website — fresh salad delivery, Ahmedabad',
    'nosh7in':            'Nosh7 Ahmedabad — salad subscription & health blog',
    'growth-hub':         '5-track learning hub — sales, negotiation, AI & more',
    'invitation':         'Digital wedding invitation — Heena & Azaz',
    'leaqualify':         'Lead qualification & scoring tool for Nosh7 sales',
    'BusinessFirst':      'Digital business starter page with services & pricing',
    'item':               'Juice launch tracker — pricing, checklist & competitors',
    'Test-Writing-Tool':  'Sales message generator for WhatsApp, email & calls',
    'SAPNA':              "Sapna's Art Studio — handcrafted with love",
};

/* ── BANNER GRADIENTS ── */
const BANNERS = [
    'linear-gradient(135deg,#0077b6,#00b4d8)',
    'linear-gradient(135deg,#023e8a,#0096c7)',
    'linear-gradient(135deg,#0089a7,#48cae4)',
    'linear-gradient(135deg,#005f73,#0a9396)',
    'linear-gradient(135deg,#03045e,#0077b6)',
    'linear-gradient(135deg,#0582ca,#06d6a0)',
    'linear-gradient(135deg,#00b4d8,#7fc8f8)',
    'linear-gradient(135deg,#1d3557,#457b9d)',
];

/* ── EMOJI ICONS ── */
const ICONS = [
    ['whatsapp','💬'],['crm','📊'],['nosh7','🍱'],['food','🍽️'],
    ['partner','🤝'],['outreach','📣'],['growth','📈'],['lead','🎯'],
    ['invitation','💌'],['business','💼'],['item','📦'],
    ['test','🧪'],['tool','🔧'],['sapna','✨'],['landing','🌐'],
];
function icon(name) {
    const l = name.toLowerCase();
    for (const [k, e] of ICONS) if (l.includes(k)) return e;
    return '📁';
}

/* ── GROUPING ── */
const GROUP_ORDER = ['nosh7','websites','tools','other'];
const GROUP_NAME  = { nosh7:'🍱  Nosh7 Projects', websites:'🌐  Websites', tools:'🔧  Tools & Apps', other:'📁  Other' };

function group(name) {
    const l = name.toLowerCase();
    if (l.includes('nosh'))   return 'nosh7';
    if (['sapna','test-writing-tool','growth-hub','leaqualify'].includes(l)) return 'tools';
    if (['item','businessfirst','invitation'].includes(l)) return 'websites';
    return 'other';
}

/* ── TIME AGO ── */
function ago(d) {
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 60)      return 'just now';
    if (s < 3600)    return Math.floor(s/60)   + 'm ago';
    if (s < 86400)   return Math.floor(s/3600) + 'h ago';
    if (s < 2592000) return Math.floor(s/86400)+ 'd ago';
    return new Date(d).toLocaleDateString('en-IN', { month:'short', year:'numeric' });
}

/* ── BUILD ONE CARD ── */
function card(repo, bannerIdx) {
    const s       = SITE[repo.name]  || {};
    const siteUrl = s.url || repo.homepage || null;   // website URL first, then GitHub homepage
    const openUrl = siteUrl || repo.html_url;          // final fallback = GitHub repo page
    const isLive  = !!siteUrl;
    const pages   = s.pages || [];
    const title   = s.title || repo.name;
    const desc    = repo.description || DESC[repo.name] || 'No description yet.';
    const hasDesc = !!(repo.description || DESC[repo.name]);
    const dispUrl = openUrl.replace(/^https?:\/\//, '').replace(/\/$/, '');
    const bg      = BANNERS[bannerIdx % BANNERS.length];

    /* Sub-page chips */
    let subSection = '';
    if (pages.length > 0) {
        const kindLabel = pages.some(p => p.kind === 'page')   ? 'Sub-pages'
                        : pages.some(p => p.kind === 'anchor') ? 'Sections on this page'
                        : 'Views inside this app';

        const chips = pages.map(p => {
            if (p.kind === 'tab' || !p.href) {
                return '<span class="chip chip-tab">' + p.label + '</span>';
            }
            const chipClass = p.kind === 'page' ? 'chip chip-page' : 'chip chip-anchor';
            const prefix    = p.kind === 'page' ? '↗ ' : '# ';
            return '<a class="' + chipClass + '" href="' + p.href + '" target="_blank">' + prefix + p.label + '</a>';
        }).join('');

        subSection = '<div class="sub-section"><div class="sub-label">' + kindLabel + '</div><div class="sub-chips">' + chips + '</div></div>';
    }

    return (
        '<div class="card" data-group="' + group(repo.name) + '" ' +
             'data-search="' + (title + ' ' + repo.name + ' ' + desc).toLowerCase().replace(/"/g, '') + '" ' +
             'data-url="' + openUrl + '">' +
            '<div class="banner" style="background:' + bg + '">' +
                icon(repo.name) +
                '<span class="banner-badge ' + (isLive ? 'badge-live' : 'badge-github') + '">' +
                    (isLive ? '● Live' : 'GitHub') +
                '</span>' +
            '</div>' +
            '<div class="card-body">' +
                '<div class="card-title">' + title + '</div>' +
                '<div class="card-url">' + dispUrl + '</div>' +
                '<div class="card-desc' + (hasDesc ? '' : ' empty') + '">' + desc + '</div>' +
                subSection +
                '<div class="card-footer">' +
                    '<span class="card-updated">Updated ' + ago(repo.updated_at) + '</span>' +
                    '<a class="open-btn ' + (isLive ? 'btn-live' : 'btn-github') + '" ' +
                       'href="' + openUrl + '" target="_blank">' +
                        (isLive ? '🔗 Open Site' : 'GitHub →') +
                    '</a>' +
                '</div>' +
            '</div>' +
        '</div>'
    );
}

/* ── RENDER GRID ── */
function renderGrid(repos) {
    const grid = document.getElementById('main-grid');

    /* Sort by group order then recency */
    const sorted = [...repos].sort((a, b) => {
        const diff = GROUP_ORDER.indexOf(group(a.name)) - GROUP_ORDER.indexOf(group(b.name));
        return diff !== 0 ? diff : new Date(b.updated_at) - new Date(a.updated_at);
    });

    /* Build HTML for cards with group dividers */
    let html = '';
    let lastGroup = null;
    sorted.forEach((repo, i) => {
        const g = group(repo.name);
        if (g !== lastGroup) {
            html += '<div class="group-divider">' + GROUP_NAME[g] + '</div>';
            lastGroup = g;
        }
        html += card(repo, i);
    });

    grid.innerHTML = html;

    /* Click handler — card click opens the site URL */
    grid.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', function(e) {
            /* If user clicked a chip link or open-btn, let the link handle it */
            if (e.target.closest('a')) return;
            window.open(el.dataset.url, '_blank');
        });
    });
}

/* ── FILTER ── */
let activeGroup = 'all';
let allCards    = [];

function applyFilter() {
    const q   = document.getElementById('search-input').value.toLowerCase().trim();
    const grid = document.getElementById('main-grid');
    let visible = 0;

    grid.querySelectorAll('.card').forEach(el => {
        const groupOk  = activeGroup === 'all' || el.dataset.group === activeGroup;
        const searchOk = !q || el.dataset.search.includes(q);
        const show     = groupOk && searchOk;
        el.style.display = show ? '' : 'none';
        if (show) visible++;
    });

    /* Show/hide group dividers */
    grid.querySelectorAll('.group-divider').forEach(div => {
        /* Show divider if any following card (before next divider) is visible */
        let next = div.nextElementSibling;
        let anyVisible = false;
        while (next && !next.classList.contains('group-divider')) {
            if (next.style.display !== 'none') { anyVisible = true; break; }
            next = next.nextElementSibling;
        }
        div.style.display = anyVisible ? '' : 'none';
    });

    /* No results message */
    let noRes = grid.querySelector('.no-results');
    if (!noRes) {
        noRes = document.createElement('div');
        noRes.className = 'no-results';
        noRes.textContent = 'No projects match your search.';
        grid.appendChild(noRes);
    }
    noRes.style.display = visible ? 'none' : '';
}

/* Wire up controls */
document.getElementById('search-input').addEventListener('input', applyFilter);

document.getElementById('filter-bar').addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeGroup = btn.dataset.group;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
});

/* ── FETCH FROM GITHUB ── */
async function loadRepos() {
    let page = 1, all = [];
    while (true) {
        const res   = await fetch('https://api.github.com/users/hii2023/repos?per_page=100&sort=updated&page=' + page);
        if (!res.ok) throw new Error('GitHub API error ' + res.status);
        const batch = await res.json();
        if (!Array.isArray(batch) || batch.length === 0) break;
        all = all.concat(batch);
        if (batch.length < 100) break;
        page++;
    }
    return all;
}

/* ── MAIN ── */
(async function () {
    try {
        const repos = await loadRepos();

        /* Stats bar */
        const liveCount  = repos.filter(r => SITE[r.name]?.url || r.homepage).length;
        const subCount   = Object.values(SITE).reduce((n, s) => n + (s.pages||[]).filter(p => p.href).length, 0);
        const langs      = [...new Set(repos.map(r => r.language).filter(Boolean))];
        document.getElementById('stats-row').innerHTML =
            '<div class="stat-pill"><strong>' + repos.length + '</strong> Projects</div>' +
            '<div class="stat-pill"><strong>' + liveCount   + '</strong> Live Sites</div>' +
            '<div class="stat-pill"><strong>' + subCount    + '</strong> Sub-pages</div>' +
            '<div class="stat-pill"><strong>' + langs.length + '</strong> Languages</div>';

        renderGrid(repos);

    } catch (err) {
        /* If API fails, still show all sites from SITE_DATA */
        const fallback = Object.entries(SITE).map(([name, s]) => ({
            name,
            description: null,
            homepage: s.url,
            html_url: 'https://github.com/hii2023/' + name,
            updated_at: new Date().toISOString(),
            language: null,
        }));

        document.getElementById('stats-row').innerHTML =
            '<div class="stat-pill">⚠️ GitHub offline — showing cached data</div>';

        renderGrid(fallback);
    }
})();
</script>
