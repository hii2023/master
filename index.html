<html lang="en">
<head>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0a2342 0%, #0e4d6e 40%, #0d7d9e 75%, #1ab3cc 100%);
            background-attachment: fixed;
            color: #fff;
        }

        /* ── HERO ── */
        .hero { text-align: center; padding: 3rem 1.5rem 1.5rem; }
        .hero h1 { font-size: clamp(1.8rem,5vw,3rem); font-weight: 800; letter-spacing: -0.02em; text-shadow: 0 2px 20px rgba(0,0,0,.3); }
        .hero h1 span { background: linear-gradient(90deg,#7df9ff,#a8edff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .hero p { color: rgba(255,255,255,.6); margin-top:.4rem; font-size:.9rem; }
        .stats-row { display:flex; justify-content:center; gap:.6rem; flex-wrap:wrap; margin-top:1.3rem; }
        .stat-pill { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); border-radius:40px; padding:.35rem 1rem; font-size:.78rem; color:rgba(255,255,255,.9); }
        .stat-pill strong { color:#fff; }

        /* ── CONTROLS ── */
        .controls { max-width:760px; margin:1.75rem auto 0; padding:0 1.5rem; }
        .search-row { display:flex; gap:.6rem; align-items:center; }
        .search-wrap { position:relative; flex:1; }
        .search-icon { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); pointer-events:none; font-size:.9rem; }
        .search-wrap input {
            width:100%; padding:.72rem 1rem .72rem 2.5rem;
            border-radius:12px; border:1.5px solid rgba(255,255,255,.2);
            background:rgba(255,255,255,.1); color:#fff; font-size:.9rem; outline:none;
            transition:border-color .2s,background .2s;
        }
        .search-wrap input::placeholder { color:rgba(255,255,255,.4); }
        .search-wrap input:focus { border-color:rgba(125,249,255,.6); background:rgba(255,255,255,.15); }

        /* Add button */
        .add-btn {
            display:inline-flex; align-items:center; gap:.4rem;
            padding:.65rem 1.1rem; border-radius:12px; border:none; cursor:pointer;
            background:rgba(125,249,255,.22); border:1.5px solid #7df9ff;
            color:#7df9ff; font-size:.85rem; font-weight:600;
            transition:all .18s; white-space:nowrap; flex-shrink:0;
        }
        .add-btn:hover { background:rgba(125,249,255,.35); }

        .filters { display:flex; gap:.45rem; flex-wrap:wrap; margin-top:.9rem; justify-content:center; }
        .filter-btn {
            padding:.35rem .95rem; border-radius:30px;
            border:1.5px solid rgba(255,255,255,.22); background:rgba(255,255,255,.07);
            color:rgba(255,255,255,.7); font-size:.78rem; font-weight:500; cursor:pointer; transition:all .18s;
        }
        .filter-btn:hover  { background:rgba(255,255,255,.16); color:#fff; }
        .filter-btn.active { background:rgba(125,249,255,.22); border-color:#7df9ff; color:#7df9ff; }

        /* ── GRID ── */
        .container { max-width:1180px; margin:2rem auto 4rem; padding:0 1.5rem; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:1.4rem; }

        /* Group divider */
        .group-divider {
            grid-column:1/-1; font-size:.67rem; font-weight:700; letter-spacing:.1em;
            text-transform:uppercase; color:rgba(255,255,255,.45);
            padding-bottom:.3rem; border-bottom:1px solid rgba(255,255,255,.12); margin-top:.6rem;
        }

        /* ── CARD ── */
        .card {
            background:#fff; border-radius:16px; overflow:hidden;
            display:flex; flex-direction:column; cursor:pointer; position:relative;
            transition:transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
        }
        .card:hover { transform:translateY(-5px) scale(1.01); box-shadow:0 18px 48px rgba(0,0,0,.28); }
        .card:active { transform:translateY(-2px); }

        /* Delete button (custom links only) */
        .card-delete {
            position:absolute; top:8px; left:8px; z-index:10;
            width:22px; height:22px; border-radius:50%; border:none; cursor:pointer;
            background:rgba(0,0,0,.35); color:#fff; font-size:.7rem;
            display:none; align-items:center; justify-content:center;
            transition:background .15s;
        }
        .card:hover .card-delete { display:flex; }
        .card-delete:hover { background:rgba(220,38,38,.8); }

        /* Banner */
        .banner {
            height:100px; display:flex; align-items:center; justify-content:center;
            font-size:2.8rem; line-height:1; position:relative; flex-shrink:0;
            background-size:cover; background-position:center;
        }
        .banner-emoji { text-shadow:0 2px 8px rgba(0,0,0,.3); }
        .banner-badge {
            position:absolute; top:9px; right:10px; font-size:.58rem; font-weight:700;
            padding:.15rem .5rem; border-radius:20px; letter-spacing:.05em; text-transform:uppercase;
        }
        .badge-live   { background:rgba(255,255,255,.3); color:#fff; }
        .badge-github { background:rgba(0,0,0,.22); color:rgba(255,255,255,.85); }
        .badge-source { background:rgba(125,249,255,.35); color:#fff; }

        /* Card body */
        .card-body { padding:1rem 1.1rem 1.1rem; display:flex; flex-direction:column; flex-grow:1; }
        .card-title { font-size:.97rem; font-weight:700; color:#111827; margin-bottom:.18rem; word-break:break-word; }
        .card-url   { font-size:.66rem; color:#60a5fa; margin-bottom:.5rem; word-break:break-all; font-family:'SF Mono','Fira Code',monospace; }
        .card-desc  { font-size:.82rem; color:#6b7280; line-height:1.55; flex-grow:1; margin-bottom:.8rem; }
        .card-desc.empty { font-style:italic; color:#d1d5db; }

        /* Sub-pages */
        .sub-section { margin-bottom:.8rem; }
        .sub-label { font-size:.6rem; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:#9ca3af; margin-bottom:.38rem; }
        .sub-chips { display:flex; flex-wrap:wrap; gap:.28rem; }
        .chip {
            display:inline-flex; align-items:center; gap:.18rem; font-size:.68rem; font-weight:500;
            padding:.22rem .55rem; border-radius:20px; text-decoration:none;
            transition:all .15s; border:1px solid transparent;
        }
        .chip-page   { background:#eff6ff; color:#2563eb; border-color:#bfdbfe; }
        .chip-anchor { background:#f0fdf4; color:#16a34a; border-color:#bbf7d0; }
        .chip-tab    { background:#f3f4f6; color:#9ca3af; border-color:#e5e7eb; cursor:default; }
        .chip-admin  { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
        .chip-page:hover   { background:#dbeafe; border-color:#93c5fd; }
        .chip-anchor:hover { background:#dcfce7; border-color:#86efac; }
        .chip-admin:hover  { background:#fee2e2; border-color:#fca5a5; }

        /* Card footer */
        .card-footer { display:flex; align-items:center; justify-content:space-between; gap:.5rem; padding-top:.6rem; border-top:1px solid #f3f4f6; margin-top:auto; }
        .card-updated { font-size:.66rem; color:#d1d5db; }
        .open-btn { font-size:.71rem; font-weight:600; padding:.33rem .8rem; border-radius:8px; text-decoration:none; white-space:nowrap; flex-shrink:0; transition:opacity .15s; }
        .open-btn:hover { opacity:.82; }
        .btn-live   { background:#0077b6; color:#fff; }
        .btn-github { background:#1f2937; color:#fff; }
        .btn-source { background:linear-gradient(135deg,#7c3aed,#4f46e5); color:#fff; }

        /* ── MODAL ── */
        .modal-overlay {
            display:none; position:fixed; inset:0; z-index:1000;
            background:rgba(0,0,0,.6); backdrop-filter:blur(6px);
            align-items:center; justify-content:center; padding:1rem;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background:#fff; border-radius:20px; width:100%; max-width:560px;
            max-height:90vh; overflow-y:auto; color:#1a1a2e;
            box-shadow:0 24px 80px rgba(0,0,0,.4);
        }
        .modal-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:1.25rem 1.5rem 1rem; border-bottom:1px solid #f3f4f6;
        }
        .modal-header h2 { font-size:1.1rem; font-weight:700; }
        .modal-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:#9ca3af; line-height:1; }
        .modal-close:hover { color:#1a1a2e; }
        .modal-body { padding:1.25rem 1.5rem; }

        .field { margin-bottom:1.1rem; }
        .field label { display:block; font-size:.78rem; font-weight:600; color:#374151; margin-bottom:.4rem; }
        .field label span { color:#9ca3af; font-weight:400; }
        .field input, .field textarea, .field select {
            width:100%; padding:.65rem .9rem; border:1.5px solid #e5e7eb; border-radius:10px;
            font-size:.88rem; color:#1a1a2e; outline:none; font-family:inherit;
            transition:border-color .2s;
        }
        .field input:focus, .field textarea:focus { border-color:#60a5fa; }
        .field textarea { resize:vertical; min-height:70px; }

        /* Sub-pages in form */
        .subpage-rows { display:flex; flex-direction:column; gap:.5rem; margin-bottom:.5rem; }
        .subpage-row { display:flex; gap:.4rem; align-items:center; }
        .subpage-row input { flex:1; padding:.5rem .7rem; border:1.5px solid #e5e7eb; border-radius:8px; font-size:.82rem; outline:none; transition:border-color .2s; }
        .subpage-row input:focus { border-color:#60a5fa; }
        .subpage-row .rm-btn { background:none; border:none; color:#d1d5db; font-size:1rem; cursor:pointer; flex-shrink:0; }
        .subpage-row .rm-btn:hover { color:#ef4444; }
        .add-subpage-btn {
            display:inline-flex; align-items:center; gap:.3rem;
            font-size:.78rem; color:#2563eb; background:none; border:none; cursor:pointer; padding:.2rem 0; font-weight:500;
        }
        .add-subpage-btn:hover { color:#1d4ed8; }

        /* Image preview */
        .img-preview { margin-top:.5rem; border-radius:8px; height:60px; background-size:cover; background-position:center; display:none; border:1px solid #e5e7eb; }

        .modal-footer { display:flex; gap:.75rem; justify-content:flex-end; padding:1rem 1.5rem 1.25rem; border-top:1px solid #f3f4f6; }
        .btn-cancel { padding:.6rem 1.2rem; border-radius:10px; border:1.5px solid #e5e7eb; background:#fff; color:#6b7280; font-size:.88rem; cursor:pointer; font-weight:500; }
        .btn-cancel:hover { background:#f9fafb; }
        .btn-save { padding:.6rem 1.4rem; border-radius:10px; border:none; background:#0077b6; color:#fff; font-size:.88rem; cursor:pointer; font-weight:600; }
        .btn-save:hover { background:#005f92; }

        /* States */
        .state-msg { grid-column:1/-1; text-align:center; padding:4rem 1rem; color:rgba(255,255,255,.5); }
        .spinner { display:inline-block; width:34px; height:34px; border:3px solid rgba(255,255,255,.15); border-top-color:#7df9ff; border-radius:50%; animation:spin .75s linear infinite; margin-bottom:.75rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .no-results { grid-column:1/-1; text-align:center; padding:3rem; color:rgba(255,255,255,.4); font-size:.9rem; }

        footer { text-align:center; padding:1.5rem; font-size:.75rem; color:rgba(255,255,255,.28); }
        footer a { color:rgba(255,255,255,.35); text-decoration:none; }
        footer a:hover { color:rgba(255,255,255,.65); }

        @media (max-width:520px) { .grid { grid-template-columns:1fr; } .search-row { flex-wrap:wrap; } }
    </style>
</head>

            <div class="field">

        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveLink()">Save Link</button>
        </div>
    </div>
</div>

    'nosh7-outreach':     'Outreach and marketing automation tool for Nosh7',
    'landing-page-nosh7': 'Partner landing page for Nosh7 nutritionists & dietitians',
    'nosh7-in':           'Main Nosh7 website — fresh salad delivery, Ahmedabad',
    'nosh7in':            'Nosh7 Ahmedabad — salad subscription & health blog',
    'growth-hub':         '5-track learning hub — sales, negotiation, AI & more',
    'invitation':         'Digital wedding invitation — Heena & Azaz',
    'leaqualify':         'Lead qualification & scoring tool for Nosh7 sales',
    'BusinessFirst':      'Digital business starter page with services & pricing',
    'item':               'Juice launch tracker — pricing, checklist & competitors',
    'Test-Writing-Tool':  'Sales message generator for WhatsApp, email & calls',
    'SAPNA':              "Sapna's Art Studio — handcrafted with love",
};

const BANNERS = [
    'linear-gradient(135deg,#0077b6,#00b4d8)',
    'linear-gradient(135deg,#023e8a,#0096c7)',
    'linear-gradient(135deg,#0089a7,#48cae4)',
    'linear-gradient(135deg,#005f73,#0a9396)',
    'linear-gradient(135deg,#03045e,#0077b6)',
    'linear-gradient(135deg,#0582ca,#06d6a0)',
    'linear-gradient(135deg,#00b4d8,#7fc8f8)',
    'linear-gradient(135deg,#1d3557,#457b9d)',
];
const SOURCE_BANNERS = [
    'linear-gradient(135deg,#7c3aed,#4f46e5)',
    'linear-gradient(135deg,#db2777,#9333ea)',
    'linear-gradient(135deg,#ea580c,#d97706)',
    'linear-gradient(135deg,#059669,#0891b2)',
];

const ICONS = [
    ['whatsapp','💬'],['crm','📊'],['nosh7','🍱'],['food','🍽️'],
    ['partner','🤝'],['outreach','📣'],['growth','📈'],['lead','🎯'],
    ['invitation','💌'],['business','💼'],['item','📦'],
    ['test','🧪'],['tool','🔧'],['sapna','✨'],['landing','🌐'],
    ['canva','🎨'],['notion','📝'],['figma','🖌️'],['sheet','📊'],
    ['dashboard','📋'],['admin','⚙️'],
];
function getIcon(name='') {
    const l = name.toLowerCase();
    for (const [k,e] of ICONS) if (l.includes(k)) return e;
    return '📁';
}

const GROUP_ORDER = ['nosh7','websites','tools','sources','other'];
const GROUP_NAME  = {nosh7:'🍱  Nosh7 Projects', websites:'🌐  Websites', tools:'🔧  Tools & Apps', sources:'🔗  Other Sources', other:'📁  Other'};
function getGroup(name) {
    const l = name.toLowerCase();
    if (l.includes('nosh')) return 'nosh7';
    if (['sapna','test-writing-tool','growth-hub','leaqualify'].includes(l)) return 'tools';
    if (['item','businessfirst','invitation'].includes(l)) return 'websites';
    return 'other';
}
function ago(d) {
    const s = Math.floor((Date.now()-new Date(d))/1000);
    if (s<60) return 'just now';
    if (s<3600) return Math.floor(s/60)+'m ago';
    if (s<86400) return Math.floor(s/3600)+'h ago';
    if (s<2592000) return Math.floor(s/86400)+'d ago';
    return new Date(d).toLocaleDateString('en-IN',{month:'short',year:'numeric'});
}

/* ── BUILD GITHUB REPO CARD ── */
function buildRepoCard(repo, bannerIdx) {
    const s        = SITE[repo.name] || {};
    const siteUrl  = s.url || repo.homepage || null;
    const openUrl  = siteUrl || repo.html_url;
    const isLive   = !!siteUrl;
    const pages    = s.pages || [];
    const title    = s.title || repo.name;
    const descTxt  = repo.description || DESC[repo.name] || '';
    const hasDesc  = !!descTxt;
    const dispUrl  = openUrl.replace(/^https?:\/\//,'').replace(/\/$/,'');
    const bg       = BANNERS[bannerIdx % BANNERS.length];

    let subSection = '';
    if (pages.length) {
        const hasReal   = pages.some(p=>p.kind==='page'||p.kind==='admin');
        const hasAnchor = pages.some(p=>p.kind==='anchor');
        const hasTabs   = pages.some(p=>p.kind==='tab');
        const kindLabel = hasReal ? 'Pages in this repo' : hasAnchor ? 'Sections on this page' : 'Views inside this app';

        const chips = pages.map(p => {
            if (p.kind==='tab'||!p.href) return '<span class="chip chip-tab">'+p.label+'</span>';
            const cls = p.kind==='admin'?'chip chip-admin': p.kind==='anchor'?'chip chip-anchor':'chip chip-page';
            const pfx = p.kind==='admin'?'🔒 ': p.kind==='page'?'↗ ':'# ';
            return '<a class="'+cls+'" href="'+p.href+'" target="_blank">'+pfx+p.label+'</a>';
        }).join('');
        subSection = '<div class="sub-section"><div class="sub-label">'+kindLabel+'</div><div class="sub-chips">'+chips+'</div></div>';
    }

    return (
        '<div class="card" data-group="'+getGroup(repo.name)+'" '+
             'data-search="'+(title+' '+repo.name+' '+descTxt).toLowerCase().replace(/"/g,'')+'" '+
             'data-url="'+openUrl+'">' +
            '<div class="banner" style="background:'+bg+'">'+
                '<span class="banner-emoji">'+getIcon(repo.name)+'</span>'+
                '<span class="banner-badge '+(isLive?'badge-live':'badge-github')+'">'+(isLive?'● Live':'GitHub')+'</span>'+
            '</div>'+
            '<div class="card-body">'+
                '<div class="card-title">'+title+'</div>'+
                '<div class="card-url">'+dispUrl+'</div>'+
                '<div class="card-desc'+(hasDesc?'':' empty')+'">'+(hasDesc?descTxt:'No description yet.')+'</div>'+
                subSection+
                '<div class="card-footer">'+
                    '<span class="card-updated">Updated '+ago(repo.updated_at)+'</span>'+
                    '<a class="open-btn '+(isLive?'btn-live':'btn-github')+'" href="'+openUrl+'" target="_blank">'+(isLive?'🔗 Open Site':'GitHub →')+'</a>'+
                '</div>'+
            '</div>'+
        '</div>'
    );
}

/* ── BUILD CUSTOM / OTHER SOURCE CARD ── */
function buildSourceCard(src, bannerIdx, deletable) {
    const openUrl  = src.url || '#';
    const dispUrl  = openUrl.replace(/^https?:\/\//,'').replace(/\/$/,'');
    const bg       = src.image ? '' : SOURCE_BANNERS[bannerIdx % SOURCE_BANNERS.length];
    const bannerStyle = src.image
        ? 'background-image:url('+src.image+');background-size:cover;background-position:center;'
        : 'background:'+bg+';';
    const subpages = src.subpages || [];
    let subSection = '';
    if (subpages.length) {
        const chips = subpages.map(p =>
            '<a class="chip chip-page" href="'+p.url+'" target="_blank">↗ '+p.name+'</a>'
        ).join('');
        subSection = '<div class="sub-section"><div class="sub-label">Other links</div><div class="sub-chips">'+chips+'</div></div>';
    }
    const deleteBtn = deletable
        ? '<button class="card-delete" onclick="deleteSource(event,\''+src.id+'\')" title="Remove">×</button>'
        : '';

    return (
        '<div class="card" data-group="sources" '+
             'data-search="'+(src.name+' '+(src.description||'')).toLowerCase().replace(/"/g,'')+'" '+
             'data-url="'+openUrl+'" data-source-id="'+src.id+'">' +
            deleteBtn+
            '<div class="banner" style="'+bannerStyle+'">'+
                '<span class="banner-emoji">'+(src.image?'':'(src.icon||getIcon(src.name))')+'</span>'+
                '<span class="banner-badge badge-source">External</span>'+
            '</div>'+
            '<div class="card-body">'+
                '<div class="card-title">'+src.name+'</div>'+
                '<div class="card-url">'+dispUrl+'</div>'+
                '<div class="card-desc'+(src.description?'':' empty')+'">'+(src.description||'No description.')+'</div>'+
                subSection+
                '<div class="card-footer">'+
                    '<span class="card-updated">External Source</span>'+
                    '<a class="open-btn btn-source" href="'+openUrl+'" target="_blank">🔗 Open</a>'+
                '</div>'+
            '</div>'+
        '</div>'
    );
}

/* ── FIX: source card emoji interpolation bug ── */
function fixSourceEmoji(src) {
    const em = src.image ? '' : (src.icon || getIcon(src.name));
    return em;
}

/* ── RENDER EVERYTHING ── */
function renderAll(repos) {
    const grid   = document.getElementById('main-grid');
    const custom = loadCustom();
    const allSrc = [...DEFAULT_SOURCES, ...custom];

    /* Sort repos by group then recency */
    const sorted = [...repos].sort((a,b) => {
        const d = GROUP_ORDER.indexOf(getGroup(a.name)) - GROUP_ORDER.indexOf(getGroup(b.name));
        return d!==0 ? d : new Date(b.updated_at)-new Date(a.updated_at);
    });

    let html = '';
    let lastGroup = null;

    sorted.forEach((repo, i) => {
        const g = getGroup(repo.name);
        if (g!==lastGroup) { html += '<div class="group-divider">'+GROUP_NAME[g]+'</div>'; lastGroup=g; }
        html += buildRepoCard(repo, i);
    });

    /* Other Sources */
    if (allSrc.length) {
        html += '<div class="group-divider">'+GROUP_NAME['sources']+'</div>';
        allSrc.forEach((src, i) => { html += buildSourceCard(src, i, !!src._custom); });
    }

    grid.innerHTML = html;

    /* Fix source card emojis (template string bug workaround) */
    grid.querySelectorAll('[data-source-id]').forEach(el => {
        const id  = el.dataset.sourceId;
        const src = allSrc.find(s=>s.id===id);
        if (!src) return;
        const emojiSpan = el.querySelector('.banner-emoji');
        if (emojiSpan) emojiSpan.textContent = fixSourceEmoji(src);
    });

    /* Click handler */
    grid.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', e => {
            if (e.target.closest('a')||e.target.closest('button')) return;
            window.open(el.dataset.url, '_blank');
        });
    });

    applyFilter();
}

/* ── FILTER ── */
let activeGroup = 'all';
function applyFilter() {
    const q    = (document.getElementById('search-input').value||'').toLowerCase().trim();
    const grid = document.getElementById('main-grid');
    let visible = 0;

    grid.querySelectorAll('.card').forEach(el => {
        const ok = (activeGroup==='all'||el.dataset.group===activeGroup)
                && (!q||el.dataset.search.includes(q));
        el.style.display = ok ? '' : 'none';
        if (ok) visible++;
    });
    grid.querySelectorAll('.group-divider').forEach(div => {
        let next=div.nextElementSibling, any=false;
        while (next&&!next.classList.contains('group-divider')) {
            if (next.style.display!=='none'){any=true;break;}
            next=next.nextElementSibling;
        }
        div.style.display = any ? '' : 'none';
    });
    let nr = grid.querySelector('.no-results');
    if (!nr) { nr=document.createElement('div'); nr.className='no-results'; nr.textContent='No results found.'; grid.appendChild(nr); }
    nr.style.display = visible ? 'none' : '';
}

document.getElementById('search-input').addEventListener('input', applyFilter);
document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeGroup = btn.dataset.group;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
});

/* ── CUSTOM LINKS (localStorage) ── */
const LS_KEY = 'myprojects_custom_links';
function loadCustom() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)||'[]').map(s=>({...s,_custom:true})); }
    catch { return []; }
}
function saveCustom(arr) {
    localStorage.setItem(LS_KEY, JSON.stringify(arr.map(({_custom,...s})=>s)));
}
function deleteSource(e, id) {
    e.stopPropagation();
    if (!confirm('Remove this link?')) return;
    const arr = loadCustom().filter(s=>s.id!==id);
    saveCustom(arr);
    document.querySelector('[data-source-id="'+id+'"]')?.remove();
    applyFilter();
}

/* ── MODAL ── */
let subRowCount = 0;
function openModal() {
    document.getElementById('f-name').value='';
    document.getElementById('f-url').value='';
    document.getElementById('f-image').value='';
    document.getElementById('f-desc').value='';
    document.getElementById('subpage-rows').innerHTML='';
    document.getElementById('img-preview').style.display='none';
    subRowCount=0;
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('f-name').focus();
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function previewImg(url) {
    const p = document.getElementById('img-preview');
    if (url && url.startsWith('http')) { p.style.backgroundImage='url('+url+')'; p.style.display='block'; }
    else p.style.display='none';
}

function addSubpageRow(name='', url='') {
    subRowCount++;
    const div = document.createElement('div');
    div.className='subpage-row'; div.dataset.rowId=subRowCount;
    div.innerHTML = '<input type="text" placeholder="Page name" value="'+name.replace(/"/g,'&quot;')+'" class="sp-name" />'+
                    '<input type="url"  placeholder="https://…"  value="'+url.replace(/"/g,'&quot;')+'"  class="sp-url"  />'+
                    '<button class="rm-btn" onclick="this.parentElement.remove()">×</button>';
    document.getElementById('subpage-rows').appendChild(div);
}

function saveLink() {
    const name = document.getElementById('f-name').value.trim();
    const url  = document.getElementById('f-url').value.trim();
    if (!name||!url) { alert('Please fill in at least the Name and URL.'); return; }

    const subpages = [...document.querySelectorAll('#subpage-rows .subpage-row')].map(row => ({
        name: row.querySelector('.sp-name').value.trim(),
        url:  row.querySelector('.sp-url').value.trim(),
    })).filter(p=>p.name&&p.url);

    const entry = {
        id:          '__custom_'+Date.now(),
        name,
        url,
        image:       document.getElementById('f-image').value.trim(),
        description: document.getElementById('f-desc').value.trim(),
        icon:        getIcon(name),
        subpages,
    };

    const arr = loadCustom();
    arr.push(entry);
    saveCustom(arr);
    closeModal();

    /* Inject new card immediately without full re-render */
    const grid    = document.getElementById('main-grid');
    const srcDivs = [...grid.querySelectorAll('[data-group="sources"]')];
    const newHtml = buildSourceCard({...entry,_custom:true}, srcDivs.length, true);
    const tmp     = document.createElement('div'); tmp.innerHTML = newHtml;
    const newCard = tmp.firstElementChild;
    const emojiSpan = newCard.querySelector('.banner-emoji');
    if (emojiSpan) emojiSpan.textContent = fixSourceEmoji(entry);
    newCard.addEventListener('click', e => {
        if (e.target.closest('a')||e.target.closest('button')) return;
        window.open(entry.url, '_blank');
    });
    grid.appendChild(newCard);
    applyFilter();
}

/* ── FETCH GITHUB REPOS ── */
async function loadRepos() {
    let page=1, all=[];
    while (true) {
        const res = await fetch('https://api.github.com/users/hii2023/repos?per_page=100&sort=updated&page='+page);
        if (!res.ok) throw new Error('GitHub API error '+res.status);
        const batch = await res.json();
        if (!Array.isArray(batch)||!batch.length) break;
        all = all.concat(batch);
        if (batch.length<100) break;
        page++;
    }
    return all;
}

/* ── MAIN ── */
(async function(){
    try {
        const repos = await loadRepos();
        const custom = loadCustom();
        const allSrc = [...DEFAULT_SOURCES,...custom];

        /* Count all clickable pages */
        const allPages = Object.values(SITE).reduce((n,s)=>n+(s.pages||[]).filter(p=>p.href).length,0);
        const liveCount = repos.filter(r=>SITE[r.name]?.url||r.homepage).length;
        const langs = [...new Set(repos.map(r=>r.language).filter(Boolean))];

        document.getElementById('stats-row').innerHTML =
            '<div class="stat-pill"><strong>'+repos.length+'</strong> Projects</div>'+
            '<div class="stat-pill"><strong>'+liveCount+'</strong> Live Sites</div>'+
            '<div class="stat-pill"><strong>'+allPages+'</strong> Sub-pages</div>'+
            '<div class="stat-pill"><strong>'+allSrc.length+'</strong> Other Sources</div>'+
            '<div class="stat-pill"><strong>'+langs.length+'</strong> Languages</div>';

        renderAll(repos);

    } catch(err) {
        /* Fallback: show everything from SITE_DATA even without GitHub API */
        const fallback = Object.entries(SITE).map(([name,s])=>({
            name, description:null, homepage:s.url,
            html_url:'https://github.com/hii2023/'+name,
            updated_at:new Date().toISOString(), language:null,
        }));
        document.getElementById('stats-row').innerHTML =
            '<div class="stat-pill">⚠️ GitHub offline — showing cached data</div>';
        renderAll(fallback);
    }
})();
</script>
